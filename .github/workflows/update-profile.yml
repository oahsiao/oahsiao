name: Update Profile Stats

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:        # 手動觸發

concurrency:
  group: update-profile
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Generate SVGs
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN }}
          ORG: M2Station
          USERNAME: oahsiao
        run: node scripts/generate.js

      - name: Commit and push (with retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 沒有變更就跳過
          if git diff --quiet -- assets/ README.md; then
            echo "No changes to commit."
            exit 0
          fi

          git add assets/*.svg assets/latest-changes.json README.md
          git commit -m "chore: update org stats [skip ci]"

          # 重試最多 5 次：每次先 rebase 最新 remote 再 push
          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push failed, retrying in 5s..."
            sleep 5
          done

          echo "All push attempts failed."
          exit 1
