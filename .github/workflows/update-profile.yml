name: Update Profile Stats

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:        # 手動觸發

# 避免同時多個 run 互相打架，造成 push 衝突
concurrency:
  group: update-profile
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      # 先確保本地是 remote 最新狀態，避免 non-fast-forward
      - name: Sync to latest remote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Generate SVGs
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN }}
          ORG: M2Station
          USERNAME: oahsiao
        run: node scripts/generate.js

      - name: Commit updated SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update org stats [skip ci]'
          file_pattern: 'assets/*.svg'
